name: PR

on:
    pull_request:
        branches: [develop]

permissions:
  contents: read

jobs:
    tests:
        name: Build/test on ${{ matrix.name }}
        runs-on: ${{ matrix.os }}
        strategy:
            fail-fast: false
            matrix:
                include:
                    - name: Linux
                      os: ubuntu-latest

        steps:
            - uses: actions/checkout@v6
            - name: Set up Go
              uses: actions/setup-go@v6
              with:
                go-version-file: go.mod
            - name: Install dependencies
              run: |
                    go version
                    go get -u golang.org/x/lint/golint
            - name: Vet and lint
              run: |
                    go vet .
                    golint .
            - name: Build
              run: |
                    go build -v ./...
            - name: start-mongodb
              uses: supercharge/mongodb-github-action@1.12.1
              with:
                mongodb-version: "7.0"
            - name: Test
              env:
                TEST_DB_URI: "mongodb://localhost:27017/unit-tests"
                TEST_COLLECTION: unit-tests
                LOG_LEVEL: DEBUG
              run: |
                    go test -v ./...
