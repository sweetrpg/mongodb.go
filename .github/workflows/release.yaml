name: Release

permissions:
  contents: read

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to (re-)run the release for, e.g. v0.1.0"
        required: true
        type: string

jobs:
  release:
    uses: sweetrpg/github-actions/.github/workflows/go-release.yaml@master
    with:
      tag: ${{ inputs.tag }}
      mongodb-version: "7.0"
      test-env: '{"TEST_DB_URI": "mongodb://localhost:27017/unit-tests", "TEST_COLLECTION": "unit-tests", "LOG_LEVEL": "DEBUG"}'
    secrets: inherit
