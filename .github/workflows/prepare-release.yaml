name: Prepare Release

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency: release

jobs:
  prepare:
    runs-on: ubuntu-latest
    steps:
      - name: Generate token
        id: ci_token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.SRPG_CI_APP_ID }}
          private-key: ${{ secrets.SRPG_CI_PRIVATE_KEY }}

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # full history required for git-cliff
          fetch-tags: true
          show-progress: true
          submodules: recursive
          persist-credentials: false

      - name: Install git-cliff
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff

      - name: Determine next version
        id: version
        run: |
          NEXT_VERSION=$(git-cliff --bumped-version)
          echo "version=${NEXT_VERSION#v}" >> "$GITHUB_OUTPUT"

      - name: Update changelog
        run: |
          git-cliff --tag v${{ steps.version.outputs.version }} --unreleased --prepend CHANGELOG.md

      # Go modules have no Cargo.toml-equivalent version field to bump - the module's
      # version is derived entirely from its git tag. CHANGELOG.md is the only file
      # this step changes.
      - name: Push release branch
        id: push_branch
        env:
          GH_TOKEN: ${{ steps.ci_token.outputs.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/sweetrpg/mongodb.go"

          BRANCH="release/${{ steps.version.outputs.version }}"
          git checkout -b "$BRANCH"

          if git diff --quiet -- CHANGELOG.md; then
            echo "::error::Nothing to release at version ${{ steps.version.outputs.version }}."
            echo "::error::git-cliff computed this as the next version, but CHANGELOG.md already matches what this run would have produced."
            echo "::error::Likely causes: (1) no new conventional commits (feat:/fix:/etc.) have landed on develop since the last release; or (2) no git tag exists yet for a prior release, so git-cliff cannot compute a version relative to history."
            exit 1
          fi

          git push --force origin "HEAD:$BRANCH"

          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          echo "head_oid=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      # The branch requires all commits to be signed. A plain `git commit` from this job
      # has no signing key attached and gets rejected, so the changelog commit is created
      # through the GraphQL API instead - commits made via `createCommitOnBranch` are
      # authored by GitHub itself and come out marked "Verified" with no GPG key to manage.
      - name: Commit changelog (signed via GitHub API)
        id: release_branch
        env:
          GH_TOKEN: ${{ steps.ci_token.outputs.token }}
        run: |
          BRANCH="${{ steps.push_branch.outputs.branch }}"
          HEAD_OID="${{ steps.push_branch.outputs.head_oid }}"

          ADDITIONS=$(jq -n \
            --arg changelog "$(base64 -w0 CHANGELOG.md)" \
            '[{path: "CHANGELOG.md", contents: $changelog}]')

          INPUT=$(jq -n \
            --arg repo "sweetrpg/mongodb.go" \
            --arg branch "$BRANCH" \
            --arg headOid "$HEAD_OID" \
            --arg message "chore(release): ${{ steps.version.outputs.version }}" \
            --argjson additions "$ADDITIONS" \
            '{
              branch: {repositoryNameWithOwner: $repo, branchName: $branch},
              message: {headline: $message},
              expectedHeadOid: $headOid,
              fileChanges: {additions: $additions}
            }')

          jq -n \
            --arg query 'mutation($input: CreateCommitOnBranchInput!) { createCommitOnBranch(input: $input) { commit { oid } } }' \
            --argjson input "$INPUT" \
            '{query: $query, variables: {input: $input}}' \
            | gh api graphql --input -

          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Open or update release PR
        id: create_pull_request
        env:
          GH_TOKEN: ${{ steps.ci_token.outputs.token }}
        run: |
          BRANCH="${{ steps.release_branch.outputs.branch }}"
          BODY="Automated release PR. Review the changelog before merging."

          # `gh pr view` matches *any* PR ever associated with this branch name,
          # including closed ones - and GitHub refuses to reopen a PR whose head branch
          # was force-pushed/recreated after closing. Only reuse a match via `gh pr edit`
          # if it's still open; otherwise fall through to `gh pr create`.
          EXISTING_STATE=$(gh pr view "$BRANCH" --json state --jq .state 2>/dev/null || echo "NONE")
          if [ "$EXISTING_STATE" = "OPEN" ]; then
            PR_URL=$(gh pr view "$BRANCH" --json url --jq .url)
            gh pr edit "$BRANCH" --title "Release ${{ steps.version.outputs.version }}" --body "$BODY"
          else
            PR_URL=$(gh pr create \
              --base master \
              --head "$BRANCH" \
              --title "Release ${{ steps.version.outputs.version }}" \
              --body "$BODY" \
              --label release)
          fi

          echo "pull-request-url=$PR_URL" >> "$GITHUB_OUTPUT"
